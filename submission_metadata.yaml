# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Used Claude only for architecture design and documentation. All scoring logic is
  explicit, human-written Python — no LLM is called during ranking, and no candidate
  data was sent to any hosted LLM service at ranking time.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Explainable hybrid ranker, no network, CPU-only, ~80s for 100K candidates.

  Relevance is an additive weighted sum of six JD-aligned features read from
  STRUCTURED evidence rather than the skills array: role identity (title/headline),
  career evidence of retrieval/ranking/recsys/search at scale, product-vs-services
  ratio, 5-9yr seniority band, India/Pune-Noida location, and an IR-depth bonus
  (retrieval + vector infra + eval literacy). The JD's explicit disqualifiers
  (keyword-stuffing in a non-AI role, consulting-only careers, research-without-
  production, LangChain-only hype, title-churn) are subtractive penalties. A
  multiplicative behavioral modifier (recruiter response rate, recency, open-to-work,
  notice period, interview reliability) captures availability. Honeypots are detected
  via internal profile contradictions (impossible tenures, expert-skill-zero-duration)
  and forced to score 0. Reasoning strings are generated only from real profile facts.

